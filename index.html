<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <!-- Apply a pinned color scheme before first paint (the app bundle loads
         too late to prevent a flash for users who override the system). -->
    <script>
      {
        const scheme = localStorage.getItem("color-scheme");
        if (scheme === "light" || scheme === "dark")
          document.documentElement.dataset.colorScheme = scheme;
      }
    </script>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f4" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0c0a09" />
    <title>Flashcut</title>
  </head>
  <body>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
